<svg xmlns="http://www.w3.org/2000/svg" width="380" height="84" viewBox="0 0 380 84" fill="none">
<style>
.h2{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;fill:#24292e}
.cap{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;fill:#586069}
.rule{fill:#d0d7de}
@media(prefers-color-scheme:dark){.h2{fill:#e6edf3}.cap{fill:#adbac7}.rule{fill:#3d444d}}
</style>
<g transform="translate(0 0)">
<text class="h2" x="0" y="22">🗂️ 다른 공간의 저장소들</text>
<rect class="rule" x="0" y="32" width="360" height="1"/>
<text class="cap" x="0" y="56">작업 성격에 따라 저장소를 여러 조직으로 나눠 관리하고 있습니다.</text>
</g>
</svg>
