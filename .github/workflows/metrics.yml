name: Metrics
on:
  # 매일 00:00 UTC(한국 09:00)에 갱신
  schedule: [{ cron: "0 0 * * *" }]
  # Actions 탭에서 수동 실행 가능
  workflow_dispatch:
  # main 브랜치 push 시에도 갱신
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Settings > Secrets 에 등록한 PAT
          token: ${{ secrets.METRICS_TOKEN }}

          # 생성될 파일명 (README에서 이 파일을 참조)
          filename: github-metrics.svg

          # 기본 통계 (헤더, 활동, 커뮤니티, 리포지토리)
          base: header, activity, community, repositories
          config_timezone: Asia/Seoul
          # fork한 리포는 언어/통계에서 제외 (남의 코드가 섞이지 않게)
          repositories_forks: no

          # 사용 언어 분포
          plugin_languages: yes
          # linguist 기반 언어 바이트 집계 (생성/벤더 파일 자동 제외)
          # indepth는 author 커밋 샘플만 세어 단일 언어로 왜곡되므로 사용 안 함
          plugin_languages_indepth: no
          # 언어 이름 옆에 바이트 크기와 비율을 텍스트로 표시
          plugin_languages_details: bytes-size, percentage
          plugin_languages_categories: markup, programming
          # 노트북 바이트 폭증 제외
          plugin_languages_ignored: jupyter-notebook
          # 1% 미만 자투리 언어(데이터/오탐) 숨김
          plugin_languages_threshold: 1%
          plugin_languages_limit: 8
          # 언어 통계에서만 제외할 스크래치/테스트/봇/데이터 리포
          # (기본 통계인 커밋/리포지토리 수는 그대로 유지됨)
          plugin_languages_skipped: |-
            bit-flo/*
            siakun/notedrop-share
            siakun/LetterAI
