name: Metrics
on:
  # 매일 00:00 UTC(한국 09:00) 갱신
  schedule: [{ cron: "0 0 * * *" }]
  # Actions 탭에서 수동 실행
  workflow_dispatch:
  # main push 시 갱신
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 구성/필터 정책과 근거는 저장소 루트 PROJECT.md 참고
      - uses: lowlighter/metrics@latest
        with:
          # Settings > Secrets에 등록한 PAT
          token: ${{ secrets.METRICS_TOKEN }}

          # 생성 파일명 (README에서 참조)
          filename: github-metrics.svg

          # 헤더만 유지 (약점 지표 섹션 제외, 강점은 아래 플러그인으로)
          base: header
          config_timezone: Asia/Seoul
          # fork 리포는 통계에서 제외
          repositories_forks: no

          # 입체 커밋 캘린더 (꾸준한 실행력 시각화)
          plugin_isocalendar: yes
          # half-year: 잔디가 작게 가로로 깔리고 스트릭/커밋 통계가 오른쪽에 붙는 컴팩트 레이아웃
          plugin_isocalendar_duration: half-year

          # 코드 작성량
          plugin_lines: yes

          # 사용 언어 분포
          plugin_languages: yes
          # indepth는 단일 언어로 왜곡되므로 미사용
          plugin_languages_indepth: no
          # 언어 옆에 바이트/비율 표시
          plugin_languages_details: bytes-size, percentage
          # 프로그래밍/마크업 언어만
          plugin_languages_categories: markup, programming
          # 1% 미만 언어 숨김
          plugin_languages_threshold: 1%
          # 상위 8개만 표시
          plugin_languages_limit: 8
          # 언어 통계 제외 목록. @use.patterns는 첫 줄 필수, 블록 안엔 패턴만.
          plugin_languages_skipped: |-
            @use.patterns
            siakun-private/*
            siakun-forks/*
            bit-flo/*
            siakun/notedrop-share
            siakun/LetterAI
